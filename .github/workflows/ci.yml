name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML syntax
        run: |
          # Check index.html exists
          if [ ! -f index.html ]; then echo "index.html not found"; exit 1; fi
          # Check blog.html exists  
          if [ ! -f blog.html ]; then echo "blog.html not found"; exit 1; fi
          # Check config.json is valid
          if [ ! -f config.json ]; then echo "config.json not found"; exit 1; fi
          python3 -c "import json; json.load(open('config.json'))"
          echo "All validation passed"